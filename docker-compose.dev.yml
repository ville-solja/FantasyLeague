version: "3.8"

services:
  backend:
    build: .
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
      - ./data:/app/data
    environment:
      - SCHEDULE_SHEET_URL=${SCHEDULE_SHEET_URL}
      - INGEST_POLL_INTERVAL=${INGEST_POLL_INTERVAL:-900}
      - TOORNAMENT_CLIENT_ID=${TOORNAMENT_CLIENT_ID:-}
      - TOORNAMENT_CLIENT_SECRET=${TOORNAMENT_CLIENT_SECRET:-}
      - TOORNAMENT_API_KEY=${TOORNAMENT_API_KEY:-}
      - TOORNAMENT_TOURNAMENT_ID=${TOORNAMENT_TOURNAMENT_ID:-}
