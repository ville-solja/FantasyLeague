<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanaliiga — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); display: grid; gap: 18px; }
  .label { font-family: var(--font-display); font-size: 11px; letter-spacing: var(--tr-widest); text-transform: uppercase; color: var(--fg-dim); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: var(--tr-wider); text-transform: uppercase; padding: 10px 18px; border: none; cursor: pointer; border-radius: var(--r-sm); }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary-hover { background: var(--accent-hover); color: var(--accent-fg); box-shadow: var(--sh-glow-orange); }
  .btn-secondary { background: var(--bg-card-hi); color: var(--fg); border: 1px solid var(--border); }
  .btn-ghost { background: transparent; color: var(--fg-muted); border: 1px solid var(--border); }
  .btn-danger { background: var(--k-err); color: #fff; }
  .btn-twitch { background: var(--k-twitch); color: #fff; }
</style>
</head>
<body>
  <div>
    <div class="label" style="margin-bottom:8px;">Primary — orange flame</div>
    <div class="row">
      <button class="btn btn-primary">Draw a card</button>
      <button class="btn btn-primary-hover">Hover</button>
      <button class="btn btn-primary" style="opacity:.4;" disabled>Disabled</button>
    </div>
  </div>
  <div>
    <div class="label" style="margin-bottom:8px;">Secondary · Ghost · Destructive · Twitch</div>
    <div class="row">
      <button class="btn btn-secondary">Refresh</button>
      <button class="btn btn-ghost">Cancel</button>
      <button class="btn btn-danger">Revoke code</button>
      <button class="btn btn-twitch">Link Twitch</button>
    </div>
  </div>
</body>
</html>
