<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanaliiga — Type: Display (Big Shoulders)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg); color: var(--fg); }
  .stack { display: grid; gap: 10px; }
  .spec { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: baseline; border-bottom: 1px solid var(--border-soft); padding-bottom: 8px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-dim); white-space: nowrap; }
</style>
</head>
<body>
  <div class="stack">
    <div class="spec">
      <span class="k-h1" style="font-size: 72px;">KANALIIGA</span>
      <span class="meta">H1 · 900 · 72 / 1.05 · +0.04em · UPPER</span>
    </div>
    <div class="spec">
      <span class="k-h2" style="font-size: 36px;">DIVISION 1 · GROUP STAGE</span>
      <span class="meta">H2 · 700 · 36 / 1.2 · +0.12em · UPPER</span>
    </div>
    <div class="spec">
      <span class="k-h3" style="font-size: 26px;">ROSTER LOCK SUNDAY</span>
      <span class="meta">H3 · 700 · 26 / 1.2 · +0.04em · UPPER</span>
    </div>
    <div class="spec">
      <span class="k-eyebrow">SEASON 14 · DOTA 2 · 2026</span>
      <span class="meta">Eyebrow · 700 · 11 · +0.22em · UPPER</span>
    </div>
  </div>
</body>
</html>
