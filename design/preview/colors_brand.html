<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanaliiga — Colors: Brand Orange & Red</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { aspect-ratio: 1.3 / 1; border-radius: var(--r-md); display: flex; flex-direction: column; justify-content: space-between; padding: 10px; border: 1px solid var(--border-soft); }
  .sw .hex { font-family: var(--font-mono); font-size: var(--fs-xs); letter-spacing: 0; text-transform: uppercase; }
  .sw .name { font-family: var(--font-display); font-size: 11px; letter-spacing: var(--tr-wider); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--k-orange-50); color:#1a1a20;"><span class="name">Orange 50</span><span class="hex">#fff2e8</span></div>
    <div class="sw" style="background:var(--k-orange-100); color:#1a1a20;"><span class="name">Orange 100</span><span class="hex">#ffd8b8</span></div>
    <div class="sw" style="background:var(--k-orange-300); color:#1a1a20;"><span class="name">Orange 300</span><span class="hex">#f59256</span></div>
    <div class="sw" style="background:var(--k-orange-500); color:#fff; box-shadow:var(--sh-glow-orange);"><span class="name">Orange 500 · Primary</span><span class="hex">#e85d1c</span></div>
    <div class="sw" style="background:var(--k-orange-600); color:#fff;"><span class="name">Orange 600 · Hover</span><span class="hex">#d24e13</span></div>
    <div class="sw" style="background:var(--k-orange-700); color:#fff;"><span class="name">Orange 700</span><span class="hex">#a83c0a</span></div>
    <div class="sw" style="background:var(--k-orange-900); color:#fff;"><span class="name">Orange 900</span><span class="hex">#5a1f05</span></div>
    <div class="sw" style="background:var(--k-red-500); color:#fff;"><span class="name">Red 500 · Flame</span><span class="hex">#c8321a</span></div>
    <div class="sw" style="background:var(--k-amber-500); color:#1a1a20; box-shadow:var(--sh-glow-amber);"><span class="name">Amber 500 · Legendary</span><span class="hex">#f0a83a</span></div>
    <div class="sw" style="background:var(--k-amber-300); color:#1a1a20;"><span class="name">Amber 300</span><span class="hex">#ffc96a</span></div>
  </div>
</body>
</html>
