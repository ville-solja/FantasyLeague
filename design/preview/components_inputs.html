<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanaliiga — Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); display: grid; gap: 14px; max-width: 620px; }
  .label { font-family: var(--font-display); font-size: 10px; letter-spacing: var(--tr-widest); text-transform: uppercase; color: var(--fg-dim); margin-bottom: 6px; display: block; }
  input, select { width: 100%; background: var(--k-ink-900); color: var(--fg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 9px 12px; font-family: var(--font-body); font-size: 14px; }
  input:focus, select:focus { border-color: var(--accent); outline: 2px solid var(--accent); outline-offset: 2px; }
  .field { display: block; }
  .invalid { border-color: var(--k-err) !important; }
  .err { font-size: 12px; color: var(--k-err); margin-top: 4px; }
  .helper { font-size: 12px; color: var(--fg-dim); margin-top: 4px; }
</style>
</head>
<body>
  <div class="field">
    <span class="label">Username</span>
    <input type="text" value="muffa_caster" />
    <span class="helper">Default state — hairline border on ink-900.</span>
  </div>
  <div class="field">
    <span class="label">OpenDota account ID</span>
    <input type="text" value="103567966" style="border-color: var(--accent); outline: 2px solid var(--accent); outline-offset: 2px;" />
    <span class="helper" style="color: var(--accent);">Focus — 2px orange outline, offset.</span>
  </div>
  <div class="field">
    <span class="label">Promo code</span>
    <input type="text" value="KANA14" class="invalid" />
    <span class="err">Code already redeemed.</span>
  </div>
  <div class="field">
    <span class="label">Week</span>
    <select><option>Week 7 · 20–26 Apr</option></select>
  </div>
</body>
</html>
