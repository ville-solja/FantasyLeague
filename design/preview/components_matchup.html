<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanaliiga — Matchup Row (Schedule)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg); display: grid; gap: 10px; }
  .row { display: grid; grid-template-columns: 64px 1fr 80px 1fr 110px; align-items: center; gap: 14px; padding: 12px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); }
  .row.past { opacity: 0.45; }
  .div { font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: var(--tr-widest); text-transform: uppercase; padding: 3px 8px; border-radius: var(--r-xs); text-align: center; }
  .div1 { background: #1a1a2a; color: #7a7aca; border: 1px solid #3a3a6a; }
  .div2 { background: #1a2a1a; color: #7aca7a; border: 1px solid #3a6a3a; }
  .team { font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: var(--tr-wider); text-transform: uppercase; }
  .team.right { text-align: right; }
  .score { font-family: var(--font-display); font-weight: 900; font-size: 22px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .vs { font-family: var(--font-display); font-weight: 900; font-size: 11px; color: var(--accent); letter-spacing: var(--tr-wider); }
  .meta { font-family: var(--font-body); font-size: 12px; color: var(--fg-dim); text-align: right; }
  a { color: var(--k-rarity-rare); }
</style>
</head>
<body>
  <div class="row">
    <span class="div div1">Div 1</span>
    <span class="team">REAKTOR</span>
    <span class="score">2<span class="vs">VS.</span>1</span>
    <span class="team right">INNOFACTOR</span>
    <span class="meta">Tue 20:00 · <a>Twitch</a></span>
  </div>
  <div class="row past">
    <span class="div div2">Div 2</span>
    <span class="team">CGI</span>
    <span class="score">0<span class="vs">VS.</span>2</span>
    <span class="team right">FUTURICE</span>
    <span class="meta">Sun 18:00 · Finished</span>
  </div>
  <div class="row">
    <span class="div div1">Div 1</span>
    <span class="team">VINCIT</span>
    <span class="score" style="color: var(--fg-dim);">—<span class="vs">VS.</span>—</span>
    <span class="team right">SIILI</span>
    <span class="meta">Thu 19:30 · B02</span>
  </div>
</body>
</html>
