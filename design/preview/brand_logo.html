<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanaliiga — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg); display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center; }
  .logo { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 22px; width: 230px; display:flex; align-items:center; justify-content:center; }
  .logo img { width: 180px; height: auto; display: block; }
  .meta { display: grid; gap: 6px; }
  .k-h3 { margin-bottom: 6px; }
  .k-body { margin: 0; font-size: 13px; color: var(--fg-muted); }
  .k-caption { color: var(--fg-dim); }
</style>
</head>
<body>
  <div class="logo"><img src="../assets/logo_kanaliiga_primary.png" alt="Kanaliiga primary logo"></div>
  <div class="meta">
    <span class="k-eyebrow">PRIMARY MARK</span>
    <h3 class="k-h3">Kanaliiga · Corporate Esports League</h3>
    <p class="k-body">Chicken mascot in flame shield. Always on dark backgrounds. Minimum 80px. Never recolor.</p>
    <p class="k-caption" style="margin-top:6px;">assets/logo_kanaliiga_primary.png · 512×512 · transparent PNG</p>
  </div>
</body>
</html>
