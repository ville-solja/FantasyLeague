<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FantasyLeague — Live</title>
<link rel="stylesheet" href="extension.css">
<style>
  .step { display: none; }
  .step.active { display: block; }

  .series-item, .match-item {
    padding: 10px 12px;
    margin: 6px 0;
    background: #2c2c3a;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .series-item:hover, .match-item:hover { border-color: #9147ff; }
  .series-item .versus { font-weight: 700; font-size: 0.95rem; }
  .meta { font-size: 0.75rem; color: #adadb8; margin-top: 2px; }
  .match-item.mvp-set { border-color: #3d9142; }

  .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
  .player-item {
    padding: 8px 10px;
    background: #2c2c3a;
    border-radius: 5px;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .player-item:hover { border-color: #9147ff; }
  .player-item.selected { border-color: #9147ff; background: #3a2a5a; }
  .player-item .pname { font-weight: 600; font-size: 0.85rem; }
  .player-item .ptag  { font-size: 0.7rem; color: #adadb8; }

  .confirm-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 0 4px;
    border-top: 1px solid #3d3d50;
    margin-top: 8px;
  }
  .confirm-bar.visible { display: flex; }
  .confirm-bar .selected-name { font-weight: 700; color: #9147ff; flex: 1; font-size: 0.9rem; }

  .back-link {
    background: none; border: none; color: #adadb8;
    font-size: 0.8rem; cursor: pointer; padding: 0; text-decoration: underline;
    display: block; margin-bottom: 6px;
  }
  .back-link:hover { color: #efeff1; }

  .drop-result {
    font-size: 0.75rem; color: #adadb8; margin-top: 6px; padding: 6px 8px;
    background: #1a1a24; border-radius: 4px;
  }
</style>
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script src="extension.js"></script>
</head>
<body>

<div id="banner" class="banner"></div>

<!-- Step 0: entry -->
<div id="mvp-step-0" class="step active" style="padding-top:8px">
  <p style="font-weight:700;margin-bottom:4px">FantasyLeague Quick Actions</p>
  <p class="muted" style="margin-bottom:12px">After a match ends, appoint the MVP. This also drops tokens to viewers currently in the panel pool.</p>
  <button id="btn-start-mvp">Select match MVP</button>
</div>

<!-- Step 1: series list -->
<div id="mvp-step-1" class="step">
  <button class="back-link" id="btn-back-0">← Cancel</button>
  <p class="muted" style="margin-bottom:4px">Select a series:</p>
  <div id="series-list"></div>
</div>

<!-- Step 2: match within series -->
<div id="mvp-step-2" class="step">
  <button class="back-link" id="btn-back-1">← Back to series</button>
  <p class="muted" id="step2-label" style="margin-bottom:4px">Select a match:</p>
  <div id="match-list"></div>
</div>

<!-- Step 3: player grid -->
<div id="mvp-step-3" class="step">
  <button class="back-link" id="btn-back-2">← Back to matches</button>
  <p class="muted" id="step3-label" style="margin-bottom:4px">Select the MVP:</p>
  <div class="player-grid" id="player-grid"></div>
  <div class="confirm-bar" id="confirm-bar">
    <span class="selected-name" id="selected-player-name"></span>
    <button id="btn-confirm-mvp">Confirm MVP &amp; Drop Tokens</button>
  </div>
</div>

<script src="live_config.js"></script>
</body>
</html>
