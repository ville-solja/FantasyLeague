version: "3.8"

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-local/dota-kanaliiga-fantasy}:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./twitch-extension:/app/twitch-extension
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Pass through vars from repo .env (Compose interpolation often misses them on Windows).
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OPENDOTA_API_KEY=${OPENDOTA_API_KEY:-}
      - INGEST_POLL_INTERVAL=${INGEST_POLL_INTERVAL:-900}
      - TOORNAMENT_CLIENT_ID=${TOORNAMENT_CLIENT_ID:-}
      - TOORNAMENT_CLIENT_SECRET=${TOORNAMENT_CLIENT_SECRET:-}
      - TOORNAMENT_API_KEY=${TOORNAMENT_API_KEY:-}
      - TOORNAMENT_TOURNAMENT_ID=${TOORNAMENT_TOURNAMENT_ID:-}

