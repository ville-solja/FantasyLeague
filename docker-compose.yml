version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: dota
      POSTGRES_PASSWORD: dota
      POSTGRES_DB: fantasy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://dota:dota@db:5432/fantasy

volumes:
  pgdata: